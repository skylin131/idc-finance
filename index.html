<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0077B6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IDC 收支">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>IDC 潛水收支管理</title>
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-circle">IDC</div>
          <h1 id="login-title">設定密碼</h1>
          <p id="login-subtitle">首次使用，請設定一組密碼</p>
        </div>
        <form id="login-form">
          <div class="input-group">
            <label>密碼</label>
            <input type="password" id="login-password" placeholder="請輸入密碼" autocomplete="current-password">
          </div>
          <div class="input-group" id="confirm-group">
            <label>確認密碼</label>
            <input type="password" id="login-confirm" placeholder="再輸入一次">
          </div>
          <button type="submit" class="btn btn-primary btn-full">確認</button>
          <button type="button" id="skip-btn" class="btn btn-ghost btn-full" style="margin-top:10px">不設定密碼，直接進入</button>
          <div id="login-error" class="error-msg" style="display:none"></div>
        </form>
        <div id="logout-hint" style="display:none;text-align:center;margin-top:16px;font-size:13px;color:var(--text-3);cursor:pointer">
          忘記密碼？點此重設
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen" style="display:none">
      <header class="app-header">
        <button class="btn-icon" id="back-btn" style="display:none" onclick="history.back()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="page-title">總覽</h1>
        <div id="header-actions" style="width:40px"></div>
      </header>
      <main id="page-content"></main>
      <nav class="bottom-nav">
        <a href="#/dashboard" class="nav-item" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>總覽</span>
        </a>
        <a href="#/records" class="nav-item" data-page="records">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          <span>記錄</span>
        </a>
        <a href="#/add" class="nav-item nav-add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" fill="currentColor" stroke="none"/><line x1="12" y1="8" x2="12" y2="16" stroke="white" stroke-width="2.5"/><line x1="8" y1="12" x2="16" y2="12" stroke="white" stroke-width="2.5"/></svg>
          <span>新增</span>
        </a>
        <a href="#/categories" class="nav-item" data-page="categories">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          <span>分類</span>
        </a>
        <a href="#/stats" class="nav-item" data-page="stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>統計</span>
        </a>
      </nav>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
